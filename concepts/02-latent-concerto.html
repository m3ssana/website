<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#160726" />
  <title>02 · Latent Concerto — messana.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <canvas class="bg" id="scene" aria-hidden="true"></canvas>

  <div class="stage">
    <h1 class="wordmark">messana<span class="ai">.ai</span></h1>
    <span class="concept-label">latent concerto</span>
  </div>

  <div class="chrome" aria-hidden="true">
    <div class="row">
      <a class="back" href="index.html">&larr; all concepts</a>
      <span class="tag">concept <b>02</b> // latent concerto</span>
    </div>
    <div class="row">
      <span class="tag" id="morphtag">latent space &middot; <b>violin</b></span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const N = 9000;

    // ---- Sample a 2D silhouette drawn to an offscreen canvas into N world points ----
    function sampleShape(draw) {
      const S = 256;
      const cv = document.createElement('canvas');
      cv.width = cv.height = S;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0, 0, S, S);
      ctx.fillStyle = '#fff';
      draw(ctx, S);
      const data = ctx.getImageData(0, 0, S, S).data;
      const filled = [];
      for (let y = 0; y < S; y++)
        for (let x = 0; x < S; x++)
          if (data[(y * S + x) * 4 + 3] > 128) filled.push(x, y);
      const count = filled.length / 2 || 1;
      const out = new Float32Array(N * 3);
      const scale = 46 / S;
      for (let i = 0; i < N; i++) {
        const k = ((Math.random() * count) | 0) * 2;
        const px = filled[k] ?? S / 2, py = filled[k + 1] ?? S / 2;
        out[i * 3]     = (px - S / 2) * scale + (Math.random() - 0.5) * 0.25;
        out[i * 3 + 1] = -(py - S / 2) * scale + (Math.random() - 0.5) * 0.25;
        out[i * 3 + 2] = (Math.random() - 0.5) * 2.0;
      }
      return out;
    }

    const violin = sampleShape((ctx, S) => {
      ctx.translate(S / 2, S / 2);
      ctx.beginPath(); ctx.ellipse(0, 46, 58, 66, 0, 0, 7); ctx.fill();   // lower bout
      ctx.beginPath(); ctx.ellipse(0, -34, 44, 50, 0, 0, 7); ctx.fill();  // upper bout
      ctx.fillRect(-9, -118, 18, 70);                                     // neck
      ctx.beginPath(); ctx.arc(0, -118, 15, 0, 7); ctx.fill();            // scroll
    });

    const piano = sampleShape((ctx, S) => {
      const keys = 14, w = S / keys;
      for (let i = 0; i < keys; i++) ctx.fillRect(i * w + 1.5, S * 0.34, w - 3, S * 0.34);
      const black = [1, 1, 0, 1, 1, 1, 0];
      for (let i = 0; i < keys; i++)
        if (black[i % 7]) ctx.fillRect(i * w + w * 0.6, S * 0.34, w * 0.5, S * 0.2);
    });

    // Abstract blob (latent): noisy sphere generated directly
    const blob = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const u = Math.random(), v = Math.random();
      const th = 2 * Math.PI * u, ph = Math.acos(2 * v - 1);
      const r = 15 + Math.sin(ph * 4 + th * 3) * 2.2;
      blob[i * 3]     = r * Math.sin(ph) * Math.cos(th);
      blob[i * 3 + 1] = r * Math.cos(ph);
      blob[i * 3 + 2] = r * Math.sin(ph) * Math.sin(th);
    }

    const seeds = new Float32Array(N);
    for (let i = 0; i < N; i++) seeds[i] = Math.random();

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(violin, 3)); // target A
    geo.setAttribute('aB', new THREE.BufferAttribute(piano, 3));
    geo.setAttribute('aC', new THREE.BufferAttribute(blob, 3));
    geo.setAttribute('aSeed', new THREE.BufferAttribute(seeds, 1));

    const uniforms = {
      uTime:  { value: 0 },
      uW:     { value: new THREE.Vector3(1, 0, 0) },
      uColA:  { value: new THREE.Color(0x7c3aed) },
      uColB:  { value: new THREE.Color(0xe9deff) },
    };
    const material = new THREE.ShaderMaterial({
      uniforms,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthTest: false,
      depthWrite: false,
      vertexShader: /* glsl */`
        attribute vec3 aB;
        attribute vec3 aC;
        attribute float aSeed;
        uniform vec3 uW;
        uniform float uTime;
        varying float vGlow;
        void main() {
          vec3 pos = position * uW.x + aB * uW.y + aC * uW.z;
          float wob = sin(uTime * 0.8 + aSeed * 6.2831);
          pos += wob * 0.35;
          vGlow = 0.35 + 0.65 * (0.5 + 0.5 * sin(uTime * 2.0 + aSeed * 25.0));
          vec4 mv = modelViewMatrix * vec4(pos, 1.0);
          gl_PointSize = (1.6 + 2.4 * vGlow) * (300.0 / -mv.z);
          gl_Position = projectionMatrix * mv;
        }`,
      fragmentShader: /* glsl */`
        uniform vec3 uColA;
        uniform vec3 uColB;
        varying float vGlow;
        void main() {
          vec2 d = gl_PointCoord - 0.5;
          float r = length(d);
          if (r > 0.5) discard;
          float a = smoothstep(0.5, 0.0, r);
          vec3 c = mix(uColA, uColB, vGlow);
          gl_FragColor = vec4(c, a * (0.45 + 0.55 * vGlow));
        }`,
    });

    const points = new THREE.Points(geo, material);
    points.frustumCulled = false;

    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0x160726, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    scene.add(points);
    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 300);
    camera.position.set(0, 0, 56);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.15, 0.7, 0.05);
    composer.addPass(bloom);
    composer.addPass(new OutputPass());

    const names = ['violin', 'piano', 'latent space'];
    const tag = document.getElementById('morphtag');

    function onResize() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
      bloom.setSize(innerWidth, innerHeight);
    }
    addEventListener('resize', onResize);

    function setWeights(t) {
      const PHASE = 4.0;                       // seconds per state
      const seg = (t / PHASE) % 3;             // 0..3
      const i0 = Math.floor(seg);
      const e = (Math.sin((seg - i0 - 0.5) * Math.PI) * 0.5 + 0.5); // eased frac
      const w = [0, 0, 0];
      w[i0] = 1 - e;
      w[(i0 + 1) % 3] = e;
      uniforms.uW.value.set(w[0], w[1], w[2]);
      const label = e < 0.5 ? names[i0] : names[(i0 + 1) % 3];
      tag.innerHTML = 'latent space &middot; <b>' + label + '</b>';
    }

    const clock = new THREE.Clock();
    let running = true;
    function animate() {
      if (!running) return;
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      uniforms.uTime.value = t;
      setWeights(t);
      points.rotation.y = Math.sin(t * 0.15) * 0.4;
      camera.position.x = Math.sin(t * 0.1) * 4;
      camera.lookAt(0, 0, 0);
      composer.render();
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) running = false;
      else if (!reduceMotion && !running) { running = true; clock.getDelta(); animate(); }
    });

    if (reduceMotion) { setWeights(0); uniforms.uTime.value = 1.0; composer.render(); }
    else animate();
  </script>
</body>
</html>
