<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fbf9ff" />
  <title>04 · Ivory &amp; Amethyst — messana.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .beams { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .piano {
      position: fixed;
      left: 50%; bottom: 0;
      transform: translateX(-50%);
      width: min(94vw, 980px);
      height: clamp(150px, 30vh, 300px);
      z-index: 4;
      display: flex;
      align-items: stretch;
      pointer-events: auto;
      filter: drop-shadow(0 -10px 40px rgba(124, 58, 237, 0.18));
    }
    .wkey {
      position: relative;
      flex: 1;
      margin: 0 1px;
      background: linear-gradient(180deg, #ffffff, #efe9fb);
      border: 1px solid rgba(124, 58, 237, 0.18);
      border-bottom: none;
      border-radius: 0 0 8px 8px;
      cursor: pointer;
      transition: background 0.18s var(--ease), transform 0.08s var(--ease);
    }
    .wkey.lit { background: linear-gradient(180deg, #ddccff, #c4b5fd); transform: translateY(2px); }
    .bkey {
      position: absolute;
      top: 0;
      width: 5.4%;
      height: 60%;
      background: linear-gradient(180deg, #3b1378, #2e1065);
      border-radius: 0 0 6px 6px;
      z-index: 5;
      cursor: pointer;
      transform: translateX(-50%);
      transition: background 0.18s var(--ease), transform 0.08s var(--ease);
    }
    .bkey.lit { background: linear-gradient(180deg, #a78bfa, #7c3aed); transform: translateX(-50%) translateY(2px); }
    .stage { justify-content: flex-start; padding-top: 14vh; }
  </style>
</head>
<body class="light">
  <canvas class="beams" id="beams" aria-hidden="true"></canvas>

  <div class="stage">
    <h1 class="wordmark">messana<span class="ai">.ai</span></h1>
    <span class="concept-label">ivory &amp; amethyst</span>
  </div>

  <div class="piano" id="piano"></div>

  <div class="chrome" aria-hidden="true">
    <div class="row">
      <a class="back" href="index.html">&larr; all concepts</a>
      <span class="tag">concept <b>04</b> // ivory &amp; amethyst</span>
    </div>
    <div class="row">
      <span class="tag">play a key &middot; <b>ai accompanies</b></span>
    </div>
  </div>

  <script>
    const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const piano = document.getElementById('piano');
    const WHITE = 14;
    const blackAfter = [0, 1, 3, 4, 5, 8, 10, 11, 12]; // white-key indices that get a black key to the right
    const wkeys = [];

    for (let i = 0; i < WHITE; i++) {
      const k = document.createElement('div');
      k.className = 'wkey';
      k.dataset.kind = 'w';
      piano.appendChild(k);
      wkeys.push(k);
    }
    // place black keys at boundaries between white keys
    for (const idx of blackAfter) {
      if (idx >= WHITE - 1) continue;
      const b = document.createElement('div');
      b.className = 'bkey';
      b.dataset.kind = 'b';
      b.style.left = `${((idx + 1) / WHITE) * 100}%`;
      piano.appendChild(b);
    }

    // ---- light beams canvas ----
    const cv = document.getElementById('beams');
    const ctx = cv.getContext('2d');
    let W, H, dpr;
    function fit() {
      dpr = Math.min(devicePixelRatio, 2);
      W = innerWidth; H = innerHeight;
      cv.width = W * dpr; cv.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    fit();
    addEventListener('resize', fit);

    let beams = [];
    function strike(el) {
      el.classList.add('lit');
      setTimeout(() => el.classList.remove('lit'), 220);
      const r = el.getBoundingClientRect();
      const x = r.left + r.width / 2;
      const isBlack = el.dataset.kind === 'b';
      beams.push({ x, top: r.top, born: performance.now(), black: isBlack, w: r.width });
    }

    const allKeys = () => [...document.querySelectorAll('.wkey, .bkey')];
    allKeys().forEach((k) => {
      k.addEventListener('pointerdown', (e) => { e.preventDefault(); strike(k); });
      k.addEventListener('pointerenter', (e) => { if (e.buttons) strike(k); });
    });

    // autoplay: a gentle, looping purple phrase
    const phrase = [0, 4, 7, 4, 9, 7, 4, 2, 5, 9, 7, 4, 0, 7, 4, 2];
    let pstep = 0, lastPlay = 0;
    function autoplay(now) {
      if (now - lastPlay > 560) {
        lastPlay = now;
        const note = phrase[pstep % phrase.length];
        const wk = wkeys[note % WHITE];
        if (wk) strike(wk);
        pstep++;
      }
    }

    function draw(now) {
      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'lighter';
      beams = beams.filter((b) => now - b.born < 1400);
      for (const b of beams) {
        const age = (now - b.born) / 1400;
        const alpha = (1 - age) * 0.5;
        const reach = b.top * (0.2 + 0.8 * age);
        const g = ctx.createLinearGradient(b.x, b.top, b.x, b.top - reach);
        const col = b.black ? '167, 139, 250' : '124, 58, 237';
        g.addColorStop(0, `rgba(${col}, ${alpha})`);
        g.addColorStop(1, `rgba(${col}, 0)`);
        ctx.fillStyle = g;
        const halfW = b.w * (0.6 + age * 1.4);
        ctx.beginPath();
        ctx.moveTo(b.x - b.w * 0.5, b.top);
        ctx.lineTo(b.x + b.w * 0.5, b.top);
        ctx.lineTo(b.x + halfW, b.top - reach);
        ctx.lineTo(b.x - halfW, b.top - reach);
        ctx.closePath();
        ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    let running = true;
    function loop(now) {
      if (!running) return;
      autoplay(now);
      draw(now);
      requestAnimationFrame(loop);
    }
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) running = false;
      else if (!reduceMotion && !running) { running = true; requestAnimationFrame(loop); }
    });
    if (reduceMotion) { strike(wkeys[7]); strike(wkeys[4]); draw(performance.now() + 400); }
    else requestAnimationFrame(loop);
  </script>
</body>
</html>
