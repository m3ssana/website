<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#160726" />
  <title>07 · Cymatics — messana.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <canvas class="bg" id="scene" aria-hidden="true"></canvas>

  <div class="stage">
    <h1 class="wordmark">messana<span class="ai">.ai</span></h1>
    <span class="concept-label">cymatics</span>
  </div>

  <div class="chrome" aria-hidden="true">
    <div class="row">
      <a class="back" href="index.html">&larr; all concepts</a>
      <span class="tag">concept <b>07</b> // cymatics</span>
    </div>
    <div class="row">
      <span class="tag">chladni plate &middot; <b>frequency &rarr; form</b></span>
    </div>
  </div>

  <script>
    const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const cv = document.getElementById('scene');
    const ctx = cv.getContext('2d');
    let W, H, dpr, S, cx, cy;
    function fit() {
      dpr = Math.min(devicePixelRatio, 2);
      W = innerWidth; H = innerHeight;
      cv.width = W * dpr; cv.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      S = Math.min(W, H) * 0.72;
      cx = W / 2; cy = H / 2;
    }
    fit();
    addEventListener('resize', fit);

    const COUNT = reduceMotion ? 1800 : 2800;
    const px = new Float32Array(COUNT);
    const py = new Float32Array(COUNT);
    for (let i = 0; i < COUNT; i++) { px[i] = Math.random(); py[i] = Math.random(); }

    let m = 4, n = 3, mt = 4, nt = 3, nextChange = 0;
    const chladni = (x, y, a, b) =>
      Math.cos(a * Math.PI * x) * Math.cos(b * Math.PI * y) -
      Math.cos(b * Math.PI * x) * Math.cos(a * Math.PI * y);

    function step(time) {
      if (time > nextChange) {
        mt = 1 + (Math.random() * 6 | 0);
        nt = 1 + (Math.random() * 6 | 0);
        if (nt === mt) nt = (nt % 6) + 1;
        nextChange = time + 5;
      }
      m += (mt - m) * 0.02;
      n += (nt - n) * 0.02;
      for (let i = 0; i < COUNT; i++) {
        const v = Math.abs(chladni(px[i], py[i], m, n));
        const amp = 0.006 + v * 0.05;          // vibrate more where displacement is high
        px[i] += (Math.random() - 0.5) * amp;
        py[i] += (Math.random() - 0.5) * amp;
        if (px[i] < 0) px[i] = 0; else if (px[i] > 1) px[i] = 1;
        if (py[i] < 0) py[i] = 0; else if (py[i] > 1) py[i] = 1;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      // plate
      ctx.strokeStyle = 'rgba(124, 58, 237, 0.18)';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx - S / 2, cy - S / 2, S, S);
      // particles
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(199, 179, 255, 0.85)';
      for (let i = 0; i < COUNT; i++) {
        const x = cx + (px[i] - 0.5) * S;
        const y = cy + (py[i] - 0.5) * S;
        ctx.fillRect(x, y, 1.6, 1.6);
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    let running = true, start = performance.now();
    function loop(now) {
      if (!running) return;
      step((now - start) / 1000);
      draw();
      requestAnimationFrame(loop);
    }
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) running = false;
      else if (!reduceMotion && !running) { running = true; requestAnimationFrame(loop); }
    });
    if (reduceMotion) {
      for (let k = 0; k < 240; k++) step(0.016 * k);
      draw();
    } else requestAnimationFrame(loop);
  </script>
</body>
</html>
