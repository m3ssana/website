<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>messana.ai</title>
<meta name="description" content="messana.ai — system initializing." />

<style>
  :root {
    --bg: #000000;
    --ink: #e8fff5;
    --green: #00ff9d;
    --green-dim: #00ff9d40;
    --green-deep: #0d3b2e;
    --grid: rgba(0, 255, 157, 0.06);
    --mono: 'Courier New', Courier, monospace;
    --term: 'Courier New', Courier, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    position: relative;
    min-height: 100dvh;
    min-height: 100vh;
  }

  /* ── Layered atmosphere ─────────────────────────────── */

  /* Canvas: the digital rain itself */
  #rain {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.55;
  }

  /* Subtle grid lattice */
  .grid {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  /* Vignette to anchor the center */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center,
        transparent 0%,
        rgba(0, 0, 0, 0.55) 55%,
        rgba(0, 0, 0, 0.92) 100%);
  }

  /* Scanlines */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0px,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.18) 3px,
        rgba(0, 0, 0, 0) 4px
      );
    mix-blend-mode: multiply;
    opacity: 0.6;
  }

  /* Soft grain */
  .grain {
    position: fixed;
    inset: -50%;
    z-index: 4;
    pointer-events: none;
    opacity: 0.05;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>");
    animation: grain 8s steps(8) infinite;
  }

  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-3%, -2%); }
    20% { transform: translate(-5%, 3%); }
    30% { transform: translate(3%, -4%); }
    40% { transform: translate(-1%, 5%); }
    50% { transform: translate(-3%, 2%); }
    60% { transform: translate(4%, -1%); }
    70% { transform: translate(-2%, 4%); }
    80% { transform: translate(2%, -3%); }
    90% { transform: translate(-4%, 1%); }
  }

  /* ── Layout chrome ──────────────────────────────────── */

  .stage {
    position: relative;
    z-index: 5;
    height: 100dvh;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(16px, 2.5vw, 32px);
  }

  .chrome-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    color: var(--green);
    font-family: var(--term);
    font-size: clamp(14px, 1.4vw, 18px);
    letter-spacing: 0.04em;
    text-shadow: 0 0 8px var(--green-dim);
  }

  .chrome-row .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    border: 1px solid rgba(0, 255, 157, 0.25);
    background: rgba(0, 255, 157, 0.04);
    border-radius: 2px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 12px var(--green);
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  /* ── Center stage ───────────────────────────────────── */

  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(20px, 3vw, 36px);
    text-align: center;
  }

  .pre-title {
    color: var(--green);
    font-family: var(--term);
    font-size: clamp(13px, 1.4vw, 18px);
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    opacity: 0;
    animation: fade-up 1.2s 0.2s ease-out forwards;
    text-shadow: 0 0 10px var(--green-dim);
  }

  .wordmark {
    position: relative;
    font-family: var(--mono);
    font-weight: 200;
    font-size: clamp(56px, 14vw, 220px);
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: var(--ink);
    white-space: nowrap;
    text-shadow:
      0 0 1px rgba(0, 255, 157, 0.6),
      0 0 22px rgba(0, 255, 157, 0.35),
      0 0 60px rgba(0, 255, 157, 0.18);
    opacity: 0;
    animation: fade-up 1.4s 0.5s cubic-bezier(.2,.8,.2,1) forwards;
  }

  .wordmark .accent {
    color: var(--green);
    font-weight: 300;
  }

  .wordmark .dot-mark {
    color: var(--green);
    display: inline-block;
    transform: translateY(-0.05em);
  }

  /* glitch siblings */
  .wordmark::before,
  .wordmark::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0;
  }
  .wordmark::before {
    color: #ff2d6f;
    transform: translate(-2px, 0);
    animation: glitch-a 7s infinite steps(1, end);
  }
  .wordmark::after {
    color: #00e5ff;
    transform: translate(2px, 0);
    animation: glitch-b 7s infinite steps(1, end);
  }

  @keyframes glitch-a {
    0%, 96%, 100% { opacity: 0; transform: translate(0, 0); }
    96.5%        { opacity: 0.7; transform: translate(-3px, 1px); }
    97%          { opacity: 0.5; transform: translate(2px, -1px); clip-path: inset(20% 0 50% 0); }
    97.5%        { opacity: 0; }
  }
  @keyframes glitch-b {
    0%, 96%, 100% { opacity: 0; transform: translate(0, 0); }
    96.5%        { opacity: 0.6; transform: translate(3px, -1px); clip-path: inset(50% 0 20% 0); }
    97%          { opacity: 0.4; transform: translate(-2px, 1px); }
    97.5%        { opacity: 0; }
  }

  .meta-line {
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--ink);
    font-family: var(--term);
    font-size: clamp(15px, 1.5vw, 20px);
    letter-spacing: 0.18em;
    opacity: 0;
    animation: fade-up 1.2s 0.9s ease-out forwards;
  }

  .meta-line .bar {
    height: 1px;
    width: clamp(40px, 8vw, 100px);
    background: linear-gradient(90deg, transparent, var(--green), transparent);
  }

  .meta-line .text { color: var(--green); text-shadow: 0 0 10px var(--green-dim); }

  .cursor {
    display: inline-block;
    width: 0.55em;
    height: 1em;
    background: var(--green);
    box-shadow: 0 0 12px var(--green);
    transform: translateY(0.12em);
    animation: blink 1.05s steps(1) infinite;
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }

  /* ── Bottom row ─────────────────────────────────────── */

  .bottom {
    align-items: end;
  }

  .ascii {
    color: var(--green);
    font-family: var(--mono);
    font-weight: 300;
    font-size: 11px;
    line-height: 1.15;
    opacity: 0.55;
    white-space: pre;
    text-shadow: 0 0 6px var(--green-dim);
  }

  /* ── Entrance animation ─────────────────────────────── */

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); filter: blur(6px); }
    to   { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  /* ── Responsive ─────────────────────────────────────── */

  @media (max-width: 720px) {
    .stage { padding: 18px; }
    .ascii { display: none; }
    .chrome-row { font-size: 13px; }
    .chrome-row .hide-sm { display: none; }
    .pre-title { letter-spacing: 0.4em; font-size: 12px; }
    .meta-line { font-size: 16px; letter-spacing: 0.16em; }
    .grid { background-size: 40px 40px; }
  }

  @media (max-width: 380px) {
    .chrome-row .pill { padding: 3px 8px; }
    .meta-line .bar { width: 28px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .grain, .dot, .cursor,
    .wordmark::before, .wordmark::after { animation: none; }
    .pre-title, .wordmark, .meta-line { animation-duration: 0.001s; opacity: 1; }
    #rain { opacity: 0.3; }
  }
</style>
</head>

<body>
  <canvas id="rain" aria-hidden="true"></canvas>
  <div class="grid" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <main class="stage">
    <header class="chrome-row" aria-hidden="true">
      <span class="pill"><span class="dot"></span>SYS // ONLINE</span>
      <span class="hide-sm">// NODE_07 · LAT 28.27569957247011° N · LON 82.40966697917898° W</span>
      <span id="clock" class="pill">00:00:00 UTC</span>
    </header>

    <section class="center">
      <h1 class="wordmark" data-text="messana.ai">
        messana<span class="dot-mark">.</span><span class="accent">ai</span>
      </h1>
    </section>

    <footer class="chrome-row bottom" aria-hidden="true">
      <pre class="ascii">  ▓▒░  signal locked
  ▓▒░  trace established</pre>
      <span class="hide-sm">// © 2026 messana.ai · all systems nominal</span>
      <span class="pill">v0.1 // BUILD_<span id="build">A1F3</span></span>
    </footer>
  </main>

  <script>
  (() => {
    'use strict';

    /* ─────────── Digital Rain ─────────── */
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d', { alpha: true });

    // Glyphs: katakana half-width + binary + a few mathematical
    const GLYPHS = (
      'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ' +
      '0123456789' +
      '∆∇∞≡≈⌬⌭⌶⍱⌁'
    ).split('');

    const BASE_FONT_PX = 16;
    let cols = 0;
    let drops = [];
    let fontSize = BASE_FONT_PX;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let running = true;

    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // tighter columns on mobile, looser on desktop
      fontSize = w < 720 ? 14 : 18;
      cols = Math.ceil(w / fontSize);
      drops = new Array(cols).fill(0).map(() =>
        Math.random() * (h / fontSize) * -1
      );
    }

    function step() {
      if (!running) { requestAnimationFrame(step); return; }

      const w = window.innerWidth;
      const h = window.innerHeight;

      // Trail fade — lower alpha = longer trail
      ctx.fillStyle = 'rgba(0, 0, 0, 0.07)';
      ctx.fillRect(0, 0, w, h);

      ctx.font = `${fontSize}px "Courier New", Courier, monospace`;
      ctx.textBaseline = 'top';

      for (let i = 0; i < cols; i++) {
        const x = i * fontSize;
        const y = drops[i] * fontSize;
        const ch = GLYPHS[(Math.random() * GLYPHS.length) | 0];

        // head: bright, bloom
        ctx.fillStyle = 'rgba(220, 255, 235, 0.95)';
        ctx.shadowColor = '#00ff9d';
        ctx.shadowBlur = 12;
        ctx.fillText(ch, x, y);

        // body: classic green
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(0, 255, 157, 0.55)';
        if (Math.random() > 0.975) {
          // occasional tail re-paint for variety
          ctx.fillText(GLYPHS[(Math.random() * GLYPHS.length) | 0], x, y - fontSize);
        }

        // reset drop
        if (y > h && Math.random() > 0.965) {
          drops[i] = (Math.random() * -20) | 0;
        }
        drops[i] += 1;
      }

      requestAnimationFrame(step);
    }

    /* ─────────── Clock ─────────── */
    const clockEl = document.getElementById('clock');
    function tick() {
      const d = new Date();
      const hh = String(d.getUTCHours()).padStart(2, '0');
      const mm = String(d.getUTCMinutes()).padStart(2, '0');
      const ss = String(d.getUTCSeconds()).padStart(2, '0');
      clockEl.textContent = `${hh}:${mm}:${ss} UTC`;
    }
    tick();
    setInterval(tick, 1000);

    /* ─────────── Build hash ─────────── */
    const buildEl = document.getElementById('build');
    buildEl.textContent = Array.from({ length: 4 }, () =>
      '0123456789ABCDEF'[(Math.random() * 16) | 0]
    ).join('');

    /* ─────────── Pause when tab hidden ─────────── */
    document.addEventListener('visibilitychange', () => {
      running = !document.hidden;
    });

    /* ─────────── Init ─────────── */
    resize();
    window.addEventListener('resize', resize, { passive: true });
    requestAnimationFrame(step);
  })();
  </script>
</body>
</html>
